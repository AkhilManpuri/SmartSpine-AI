<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartSpine AI Healthcare - Login</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet" />
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/css/styles.css" />
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body class="theme-dark">

  <div class="auth-container" style="width: 100%;">
    <div class="auth-card glass-panel" style="margin: auto;">
      <div class="text-center mb-6">
        <span style="font-size: 2rem;">🦴</span>
        <h2 class="mt-2">Welcome Back</h2>
      </div>
      <p class="mb-6 text-center text-secondary">Log in to view your health data</p>
      
      <form action="/login" method="POST">
        <div class="form-group">
          <label for="username">Name / Username</label>
          <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your name" value="Test User">
        </div>
        <div class="form-group mt-4">
          <label for="password">Password (Optional Demo)</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Any password works">
        </div>
        <button type="submit" class="btn btn-primary w-full mt-6">Log In</button>
      </form>
      
      <p class="mt-4 text-center text-sm"><a href="/" class="text-secondary">&larr; Back to Home</a></p>
    </div>
  </div>

</body>
</html>
